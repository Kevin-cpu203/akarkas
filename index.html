<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akarkas - Keuangan Greenhouse Melon</title>
    <!-- Library html2pdf untuk fitur cetak/bagikan PDF langsung dari browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #27ae60;
            --danger: #e74c3c;
            --bg: #faf8f5;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--primary);
            margin: 0;
        }
        
        /* Dashboard Analisis Keuangan */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        .card h3 { margin: 0; font-size: 14px; color: #7f8c8d; }
        .card h2 { margin: 10px 0 0 0; font-size: 24px; }
        .saldo-text { color: var(--text); }
        .in-text { color: var(--primary); }
        .out-text { color: var(--danger); }
        
        /* Form Input */
        .input-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        input { flex: 1; min-width: 150px; }
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn-primary:hover { background-color: #219653; }
        
        /* Voice Chat Bot & Ekspor */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-voice {
            background-color: #f39c12;
            color: white;
            border: none;
            flex: 1;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-pdf {
            background-color: #2980b9;
            color: white;
            border: none;
            flex: 1;
            cursor: pointer;
            font-weight: bold;
        }

        /* Tabel Data */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f1f8f4; color: var(--primary); }
        .action-btn {
            padding: 5px 10px;
            margin-right: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-edit { background-color: #f1c40f; color: #fff; }
        .btn-delete { background-color: var(--danger); color: #fff; }
        
        @media (max-width: 600px) {
            th, td { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <div class="header">
        <h1>Akarkas Greenhouse</h1>
        <p>Pencatatan Keuangan Gapoktan Melon</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Total Pemasukan</h3>
            <h2 class="in-text" id="tot-in">Rp 0</h2>
        </div>
        <div class="card">
            <h3>Total Pengeluaran</h3>
            <h2 class="out-text" id="tot-out">Rp 0</h2>
        </div>
        <div class="card">
            <h3>Saldo Gapoktan</h3>
            <h2 class="saldo-text" id="tot-saldo">Rp 0</h2>
        </div>
        <div class="card">
            <h3>Total Panen Melon</h3>
            <h2 class="in-text" id="tot-melon">0 Kg</h2>
        </div>
    </div>

    <div class="action-buttons data-ignore-print">
        <button class="btn-voice" onclick="startVoiceBot()">🎤 Catat dengan Suara (Chat Bot)</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 Bagikan Laporan PDF</button>
    </div>
    <p id="voice-status" style="color: #f39c12; font-size: 14px; text-align: center; display: none;">Mendengarkan... Sebutkan: "Pemasukan hasil panen melon 200 kilo 4 juta rupiah"</p>

    <div class="input-section data-ignore-print">
        <div class="form-group">
            <select id="jenis">
                <option value="pemasukan">Pemasukan (Panen)</option>
                <option value="pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="keterangan" placeholder="Keterangan (misal: Hasil Panen 1)">
        </div>
        <div class="form-group">
            <input type="number" id="nominal" placeholder="Nominal Rp (misal: 1000000)">
            <input type="number" id="berat" placeholder="Berat Melon (Kg) *opsional">
        </div>
        <input type="hidden" id="edit-id" value="">
        <button class="btn-primary" onclick="simpanData()">Simpan Catatan</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Keterangan</th>
                <th>Jenis</th>
                <th>Berat (Kg)</th>
                <th>Nominal</th>
                <th class="data-ignore-print">Aksi</th>
            </tr>
        </thead>
        <tbody id="tabel-body">
            <!-- Data akan masuk ke sini -->
        </tbody>
    </table>
</div>

<script>
    let transaksi = [];

    // Format Rupiah
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    function simpanData() {
        const jenis = document.getElementById('jenis').value;
        const keterangan = document.getElementById('keterangan').value;
        const nominal = parseInt(document.getElementById('nominal').value) || 0;
        const berat = parseInt(document.getElementById('berat').value) || 0;
        const editId = document.getElementById('edit-id').value;

        if(!keterangan || nominal <= 0) return alert('Keterangan dan Nominal harus diisi dengan benar!');

        if (editId) {
            // Proses Edit
            const index = transaksi.findIndex(t => t.id == editId);
            transaksi[index] = { id: editId, jenis, keterangan, nominal, berat };
            document.getElementById('edit-id').value = '';
        } else {
            // Proses Tambah Baru
            transaksi.push({ id: Date.now(), jenis, keterangan, nominal, berat });
        }

        // Kosongkan form
        document.getElementById('keterangan').value = '';
        document.getElementById('nominal').value = '';
        document.getElementById('berat').value = '';
        
        renderTabel();
    }

    function hapusData(id) {
        if(confirm("Apakah yakin ingin menghapus catatan ini?")) {
            transaksi = transaksi.filter(t => t.id !== id);
            renderTabel();
        }
    }

    function editData(id) {
        const data = transaksi.find(t => t.id === id);
        document.getElementById('jenis').value = data.jenis;
        document.getElementById('keterangan').value = data.keterangan;
        document.getElementById('nominal').value = data.nominal;
        document.getElementById('berat').value = data.berat;
        document.getElementById('edit-id').value = data.id;
        window.scrollTo(0, 0);
    }

    function renderTabel() {
        const tbody = document.getElementById('tabel-body');
        tbody.innerHTML = '';
        
        let inTotal = 0, outTotal = 0, totalMelon = 0;

        transaksi.forEach(t => {
            if(t.jenis === 'pemasukan') { inTotal += t.nominal; totalMelon += t.berat; }
            else { outTotal += t.nominal; }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${t.keterangan}</td>
                <td style="color: ${t.jenis === 'pemasukan' ? 'var(--primary)' : 'var(--danger)'}; font-weight:bold;">${t.jenis}</td>
                <td>${t.berat > 0 ? t.berat + ' Kg' : '-'}</td>
                <td>${formatRp(t.nominal)}</td>
                <td class="data-ignore-print">
                    <button class="action-btn btn-edit" onclick="editData(${t.id})">Edit</button>
                    <button class="action-btn btn-delete" onclick="hapusData(${t.id})">Hapus</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('tot-in').innerText = formatRp(inTotal);
        document.getElementById('tot-out').innerText = formatRp(outTotal);
        document.getElementById('tot-saldo').innerText = formatRp(inTotal - outTotal);
        document.getElementById('tot-melon').innerText = totalMelon + ' Kg';
    }

    // Fitur 1: Export PDF
    function exportPDF() {
        // Sembunyikan elemen input dan tombol aksi sebelum print
        const elementsToHide = document.querySelectorAll('.data-ignore-print');
        elementsToHide.forEach(el => el.style.display = 'none');
        
        const element = document.getElementById('app-container');
        html2pdf().from(element).save('Laporan_Akarkas_Gapoktan.pdf').then(() => {
            // Tampilkan kembali setelah PDF selesai diunduh
            elementsToHide.forEach(el => el.style.display = '');
        });
    }

    // Fitur 2: Voice Chat Bot Sederhana menggunakan Web Speech API
    function startVoiceBot() {
        const statusText = document.getElementById('voice-status');
        if (!('webkitSpeechRecognition' in window)) {
            alert('Maaf, browser Anda belum mendukung fitur input suara.');
            return;
        }

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        
        recognition.onstart = function() {
            statusText.style.display = 'block';
        };

        recognition.onresult = function(event) {
            const hasilSuara = event.results[0][0].transcript.toLowerCase();
            statusText.style.display = 'none';
            
            // Logika NLP (Natural Language Processing) Sederhana
            let jenis = 'pemasukan';
            if(hasilSuara.includes('keluar') || hasilSuara.includes('beli') || hasilSuara.includes('bayar')) jenis = 'pengeluaran';
            
            // Ekstrak angka untuk nominal
            const angkaArr = hasilSuara.match(/\d+/g);
            let nominal = 0;
            let berat = 0;

            if(angkaArr) {
                // Asumsi: Angka terkecil biasanya berat (kilo), angka terbesar biasanya rupiah (nominal)
                const angka1 = parseInt(angkaArr[0]);
                const angka2 = angkaArr.length > 1 ? parseInt(angkaArr[1]) : 0;
                
                // Menyesuaikan sebutan seperti "ribu" atau "juta"
                let pengali = 1;
                if(hasilSuara.includes('juta')) pengali = 1000000;
                else if(hasilSuara.includes('ribu')) pengali = 1000;

                // Jika ada dua angka yang ditangkap
                if(angka2 > 0) {
                    berat = angka1 < angka2 ? angka1 : angka2; // Yang kecil dianggap kilo
                    nominal = (angka1 > angka2 ? angka1 : angka2) * pengali;
                } else {
                    nominal = angka1 * pengali;
                }
            }

            document.getElementById('jenis').value = jenis;
            document.getElementById('keterangan').value = hasilSuara; // Isi keterangan dengan teks asli
            document.getElementById('nominal').value = nominal;
            document.getElementById('berat').value = berat;
            
            alert(`Sistem menangkap ucapan: "${hasilSuara}". \nSilakan periksa kembali nominal dan berat di form, lalu klik Simpan Data.`);
        };

        recognition.onerror = function(event) {
            statusText.style.display = 'none';
            alert('Gagal mendengarkan. Silakan coba lagi.');
        };

        recognition.start();
    }
</script>
</body>
</html>
